<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽卡小遊戲</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f5f5f5;
    padding:20px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

#cardArea{
    margin-top:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    display:inline-block;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
    width:250px;
    border-radius:10px;
}

#detailArea{
    margin-top:30px;
    display:none;
    background:white;
    padding:20px;
    border-radius:15px;
    max-width:500px;
    margin-left:auto;
    margin-right:auto;
}
</style>

</head>

<body>

<h1>抽卡小遊戲</h1>

<button onclick="drawCard()">抽卡！</button>

<div id="cardArea"></div>

<div id="detailArea">
    <h2 id="detailName"></h2>

```
<!-- 這裡顯示卡片圖片 -->
<img id="detailImage" width="300">

<!-- 這裡顯示卡片稀有度 -->
<h3 id="detailRarity"></h3>

<!-- 這裡顯示卡片介紹文字 -->
<p id="detailDescription"></p>
```

</div>

<script>

const cards = [

{
    // 卡片名稱
    name:"卡片1",

    // 這裡放圖片路徑
    image:"images/card1.jpg",

    // 這裡放卡片介紹
    description:"請在這裡輸入卡片1介紹",

    rarity:"SSR"
},

{
    name:"卡片2",
    image:"images/card2.jpg",
    description:"請在這裡輸入卡片2介紹",
    rarity:"SR"
},

{
    name:"卡片3",
    image:"images/card3.jpg",
    description:"請在這裡輸入卡片3介紹",
    rarity:"R"
}

];

function drawCard(){

    const randomIndex =
        Math.floor(Math.random()*cards.length);

    const card = cards[randomIndex];

    document.getElementById("cardArea").innerHTML = `
        <div class="card">
            <h2>${card.name}</h2>

            <img src="${card.image}">

            <p>${card.rarity}</p>

            <button onclick="showDetail(${randomIndex})">
                查看資訊
            </button>
        </div>
    `;
}

function showDetail(index){

    const card = cards[index];

    document.getElementById("detailName").textContent =
        card.name;

    document.getElementById("detailImage").src =
        card.image;

    document.getElementById("detailRarity").textContent =
        "稀有度：" + card.rarity;

    document.getElementById("detailDescription").textContent =
        card.description;

    document.getElementById("detailArea").style.display =
        "block";
}

</script>

</body>
</html>
